[NORADIO]
# Vehicle model IDs that should have NO radio at all: no music, no police
# radio, no story announcements, and no ambient radio from this model in
# traffic. Takes precedence over the [VEHICLES] section above.
# One numeric model ID per line. Inline # comments are allowed.
# Model ID list: https://gtamods.com/wiki/List_of_vehicles_(VC)
# Examples (remove the leading # to enable):
# 116	# Sanchez (dirt bike)
# 147	# Cube van
# 159	# Caddy (golf cart)

[STARTOFFSET]
# Open a station at a specific point in its broadcast instead of the start.
# Format:  Station Name | M:SS   (or plain seconds, e.g. 275)
# Matched by the station name in [STATIONS]; applied at each launch. Handy for
# making an original station open on a specific song (e.g. Flash FM on Billie
# Jean like the VC intro). Example (remove the # to enable):
# Flash FM | 07:27
