[SETTINGS]
AmbientRadio = 1 		# Ambient radio from cars. 0 - off, 1 - on.
ScriptIntegration = 1   # 0 = do NOT hook the game script (no announcements / mission-radio / ducking). Use for total-conversion mods with a custom main.scm that crash on missions. 1 = full integration (default).
RadioAutoTune = 0   # 1 = the station you're listening to follows you into EVERY vehicle (any distance). 0 = a different/new vehicle gets its own or a random station (default).


[CONTROLS]
RadioSwitchNext = 82 		# Button assigned to changing the station. "R" by default. Mouse scroll works regardless.
RadioSwitchNextPad = 256 	# D-PAD LEFT on Xbox controller

